<html>
<style>
  .body.vscode-light {
    background: var(--vscode-editor-background);
    color: var(--vscode-editor-foreground);
  }

  body.vscode-dark {
    background: var(--vscode-editor-background);
    color: var(--vscode-editor-foreground);
  }

  textarea {
    background: var(--vscode-input-background);
    color: var(--vscode-input-foreground);
    outline: none;
    border: var(--vscode-input-border);
    resize: none;
    width: 99%;
    height: 100px;
    font-size: var(--vscode-editor-font-size);
    margin: 10px auto;
  }

  #queryDiv {
    margin-top: 20px;
    min-height: 100px;
  }

  #resultDiv {
    margin-top: 20px;
    min-height: 100px;
  }

  table {
    border-collapse: separate;
    border-spacing: 0px 5px;
    text-align: left;
    table-layout: fixed;
    width: 98%;
  }
</style>

<body>
  <div id="headerDiv">
    <h3>MySQL</h3>
    <h4 id="headerNav"></h4>
  </div>

  <div id="queryDiv">
    <h3>Query</h3>
    <textarea id="query"></textarea>
  </div>

  <div id="resultDiv">
    <h3>Result</h3>
    <div id="result">
      <!-- <pre id="result">
        </pre> -->
    </div>
  </div>
</body>

</html>
<script>
  const vscode = acquireVsCodeApi();

  window.addEventListener('message', e => {
    const data = e.data.data;
    const event = e.data.event;
    if (data.node) {
      let navStr = data.node.user + '@' + data.node.host + ':' + data.node.port
      if (data.node.db) {
        navStr += ' > ' + data.node.db
      }
      if (data.node.table) {
        navStr += ' > ' + data.node.table
      }
      document.getElementById('headerNav').innerHTML = navStr
    }
    switch (event) {
      case 'createTable':
        break;
      case 'showCreate':
        document.getElementById('result').innerHTML = data.table.replace(/\n/g, "<br>")
        break;
      case 'desc':
        document.getElementById('result').innerHTML = tableDesc(data.desc)
        break;
      case 'show':
        document.getElementById('result').innerHTML = tableShow(data.show)
        break;
      case 'exec':
        vscode.postMessage({
          event: 'exec',
          sql: document.getElementById('query').value
        })
      default:
        document.getElementById('result').innerHTML = table(data)
        break;
    }
  })

  function tableShow(arr) {
    let table =
      '<table><tr><th>Variable Name</th><th>Value</th></tr>';
    for (let index = 0; index < arr.length; index++) {
      table += '<tr>'
      table += '<td>' + arr[index]['Variable_name'] + '</td>'
      table += '<td>' + arr[index]['Value'] + '</td>'
      table += '</tr>'
    }
    table += '</table>'
    return table
  }

  function tableDesc(arr) {
    let table = '<table><tr><th>Field</th><th>Type</th><th>Null</th><th>Key</th><th>Default</th><th>Extra</th></tr>';
    for (let index = 0; index < arr.length; index++) {
      table += '<tr>'
      table += '<td>' + arr[index]['Field'] + '</td>'
      table += '<td>' + arr[index]['Type'] + '</td>'
      table += '<td>' + arr[index]['Null'] + '</td>'
      table += '<td>' + arr[index]['Key'] + '</td>'
      table += '<td>' + arr[index]['Default'] + '</td>'
      table += '<td>' + arr[index]['Extra'] + '</td>'
      table += '</tr>'
    }
    table += '</table>'
    return table
  }
</script>
